# .pre-commit-config.yaml
# Axiom MLOps Project: Multi-Stage Quality Gate
default_language_version:
  python: python3.13

repos:
  # 1. Standard Integrity Checks (File-level safety)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  # 2. Ultra-fast Python linter and formatter (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # 3. Security scanner (Bandit)
  # NOTE: Bandit uses tags WITHOUT the 'v' prefix
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  # 4. Commit Message & Branch Standardization (Commitizen)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.2.2
    hooks:
      # Validates the commit message format during 'commit-msg' stage
      - id: commitizen
        stages: [commit-msg]
      # Validates the branch name during 'pre-push' stage
      - id: commitizen-branch
        stages: [pre-push]
